<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>AI Reply Composer</title>
  <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      padding: 12px;
    }

    h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 16px;
    }

    h4 {
      margin-bottom: 8px;
      margin-top: 0;
      font-size: 14px;
    }

    .tone-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tone-pill {
      border: 1px solid #d8dcde;
      border-radius: 16px;
      padding: 6px 12px;
      cursor: pointer;
      background: #f8f9f9;
      user-select: none;
      font-size: 12px;
    }

    .tone-pill input {
      display: none;
    }

    .tone-pill:has(input:checked) {
      background: #1f73b7;
      color: white;
      border-color: #1f73b7;
    }

    .primary-btn {
      background: #1f73b7;
      color: white;
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
      width: 100%;
      font-size: 13px;
      margin-top: 8px;
      border: none;
    }

    .primary-btn:disabled {
      background: #c2d4e8;
      cursor: not-allowed;
    }

    .reply-container {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h3>✉️ AI Reply Composer</h3>

  <h4>Tone</h4>
  <div class="tone-group">
    <label class="tone-pill">
      <input type="radio" name="tone" value="professional" checked /> Professional
    </label>
    <label class="tone-pill">
      <input type="radio" name="tone" value="friendly" /> Friendly
    </label>
    <label class="tone-pill">
      <input type="radio" name="tone" value="empathetic" /> Empathetic
    </label>
    <label class="tone-pill">
      <input type="radio" name="tone" value="apologetic" /> Apologetic
    </label>
    <label class="tone-pill">
      <input type="radio" name="tone" value="concise" /> Concise
    </label>
  </div>

  <button id="composeReplyBtn" class="primary-btn">Compose Reply</button>

  <div class="reply-container">
    <div id="statusMessage" style="margin-top: 12px; padding: 8px; border-radius: 4px; display: none; font-size: 12px;"></div>
  </div>

  <script>
    const BACKEND_URL = 'http://localhost:3000';
    const client = ZAFClient.init();

    let agentLocale = 'en-US';
    let ticketLocale = 'en-US';

    async function initLanguages() {
      try {
        const agent = await client.request('/api/v2/users/me.json');
        agentLocale = agent.user.locale;
      } catch (e) {
        console.error('Failed to load agent locale', e);
      }
    }

    async function getCompleteTicketData() {
      const ticketData = await client.get('ticket');
      const ticketId = ticketData.ticket.id;

      const ticketResponse = await client.request(`/api/v2/tickets/${ticketId}.json`);
      const ticket = ticketResponse.ticket;

      let requesterLocale = agentLocale;
      try {
        if (ticket.requester_id) {
          const requesterResponse = await client.request(`/api/v2/users/${ticket.requester_id}.json`);
          requesterLocale = requesterResponse.user.locale || agentLocale;
          ticketLocale = requesterLocale;
          console.log(`📍 Ticket locale detected: ${ticketLocale}`);
        }
      } catch (e) {
        console.warn('Could not fetch requester locale, using agent locale');
      }

      return {
        ticketId: ticket.id,
        subject: ticket.subject,
        description: ticket.description,
        status: ticket.status,
        priority: ticket.priority,
        tags: ticket.tags || [],
        brand: ticket.organization?.name || 'default_brand',  // Extract brand from organization
        locale: requesterLocale
      };
    }

    async function translateText(text, targetLanguage) {
      try {
        console.log(`🌐 Translating to ${targetLanguage}...`);
        
        const response = await client.request({
          url: `${BACKEND_URL}/translate`,
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify({
            text: text,
            targetLanguage: targetLanguage
          }),
          cors: true
        });

        return response.translatedText;
      } catch (err) {
        console.error("Translation error:", err);
        throw err;
      }
    }

    document.getElementById("composeReplyBtn").addEventListener("click", async () => {
      const statusMessage = document.getElementById("statusMessage");
      const selectedTone = document.querySelector('input[name="tone"]:checked');
      const btn = document.getElementById("composeReplyBtn");

      if (!selectedTone) {
        statusMessage.style.display = 'block';
        statusMessage.className = 'status error';
        statusMessage.style.backgroundColor = '#ffe6e6';
        statusMessage.style.color = '#cc0000';
        statusMessage.textContent = "⚠️ Please select a reply tone first";
        return;
      }

      statusMessage.style.display = 'block';
      statusMessage.className = 'status loading';
      statusMessage.style.backgroundColor = '#e8f2f9';
      statusMessage.style.color = '#1f73b7';
      statusMessage.textContent = "✨ Composing reply...";
      btn.disabled = true;

      try {
        const ticketData = await getCompleteTicketData();

        const response = await client.request({
          url: `${BACKEND_URL}/compose-reply`,
          type: "POST",
          contentType: "application/json",
          data: JSON.stringify({
            ...ticketData,
            tone: selectedTone.value,
            language: agentLocale
          }),
          cors: true
        });

        const replyText = response.reply;
        
        // Show "translating" message
        statusMessage.style.backgroundColor = '#e8f2f9';
        statusMessage.textContent = "🌐 Inserting reply into Zendesk...";

        let finalText = replyText;
        
        // Translate if needed
        if (ticketLocale && ticketLocale !== agentLocale) {
          statusMessage.textContent = `🌐 Translating to ${ticketLocale}...`;
          console.log(`🌐 Translating from ${agentLocale} to ${ticketLocale}`);
          finalText = await translateText(replyText, ticketLocale);
          console.log(`✅ Translation completed`);
        }

        // Insert into Zendesk
await client.set('ticket.comment.text', "");
        await client.invoke('ticket.comment.appendMarkdown', finalText);
        
        // Show success message
        statusMessage.style.backgroundColor = '#e6f7e6';
        statusMessage.style.color = '#006600';
        statusMessage.textContent = "✅ Reply successfully added to ticket!";
        
        setTimeout(() => {
          statusMessage.style.display = 'none';
        }, 3000);

      } catch (err) {
        console.error("Reply error:", err);
        statusMessage.style.backgroundColor = '#ffe6e6';
        statusMessage.style.color = '#cc0000';
        statusMessage.textContent = `❌ Failed to generate reply: ${err.message || 'Unknown error'}`;
      } finally {
        btn.disabled = false;
      }
    });

    initLanguages();
    client.invoke('resize', { width: '100%', height: '400px' });
  </script>
</body>

</html>
